name: Build and Release

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '10'

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.target }} --bundles appimage,deb

      - name: List bundle contents
        run: |
          echo "=== Bundle directory contents ==="
          if [ -d "src-tauri/target/release/bundle" ]; then
            ls -la src-tauri/target/release/bundle/
            echo "=== Recursive bundle contents ==="
            find src-tauri/target/release/bundle -type f -exec ls -lh {} \;
          else
            echo "Bundle directory not found"
          fi
          echo "=== AppImage directory ==="
          if [ -d "src-tauri/target/release/bundle/appimage" ]; then
            ls -la src-tauri/target/release/bundle/appimage/
          else
            echo "AppImage directory not found"
          fi
          echo "=== Deb directory ==="
          if [ -d "src-tauri/target/release/bundle/deb" ]; then
            ls -la src-tauri/target/release/bundle/deb/
          else
            echo "Deb directory not found"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/appimage/
            src-tauri/target/release/bundle/deb/
          if-no-files-found: warn
          retention-days: 5

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '10'

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: pwsh
        run: |
          $storePath = pnpm store path
          echo "STORE_PATH=$storePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app
        run: pnpm tauri build --target x86_64-pc-windows-msvc --bundles nsis

      - name: List build outputs
        shell: pwsh
        run: |
          Write-Host "=== Release directory contents ==="
          if (Test-Path "src-tauri\target\release\") {
            Get-ChildItem -Path "src-tauri\target\release\" -File | Format-Table Name, Length
          } else {
            Write-Host "Release directory not found"
          }
          Write-Host "=== Bundle directory contents ==="
          if (Test-Path "src-tauri\target\release\bundle\") {
            Get-ChildItem -Path "src-tauri\target\release\bundle\" -Recurse | Format-Table Name, Length
          } else {
            Write-Host "Bundle directory not found"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/nsis/
          if-no-files-found: warn
          retention-days: 5

  create-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          # Copy Linux artifacts
          if [ -d "artifacts/linux-artifacts" ]; then
            cp -r artifacts/linux-artifacts/* release-assets/ 2>/dev/null || true
          fi

          # Copy Windows artifacts
          if [ -d "artifacts/windows-artifacts" ]; then
            cp -r artifacts/windows-artifacts/* release-assets/ 2>/dev/null || true
          fi

          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
